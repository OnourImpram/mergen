# Mergen Governor floor gate. A drop-in CI workflow for your own project.
#
# Copy this file into your project's .github/workflows/ directory. On every pull
# request it classifies the REAL diff against the deterministic Governor floor
# (scripts/governor_floor.py) and fails the build when the change reaches the
# high-trust tier without an explicit human acknowledgement.
#
# Why a gate and not a nudge. The floor is non-downgradable: a change that
# touches an auth, payment, secrets, privacy, clinical, migration, deploy,
# permission, or release-artifact path, or whose diff carries a matching
# keyword, is forced to high-trust. The model cannot lower it. This job makes
# that floor refuse a silent merge, the third leg of the honesty discipline:
# a prompt asks, a hook nudges, a CI gate refuses.
#
# How to acknowledge. When the Governor flags a high-trust change, a human
# reviews it and records the line
#
#     Governor-Ack: high-trust
#
# anywhere in the pull-request body. The gate then passes. Without that line a
# high-trust diff fails the build. The acknowledgement is recorded in the PR,
# so the decision to ship a high-trust change is auditable.
#
# Setup is one step: vendor scripts/governor_floor.py into your repo (it is
# Python standard library only) and adjust the path below if you place it
# elsewhere.

name: governor-floor-gate

on:
  pull_request:

jobs:
  governor-floor-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # the merge-base diff needs full history

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Classify the real PR diff against the Governor floor
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          # Read changed paths into an array, one per line, and pass them quoted.
          # Quoting "${changed[@]}" is the safety: a hostile filename (glob
          # metacharacters, embedded spaces, or a leading dash) cannot word-split or
          # glob-expand to alter the set of paths the Governor classifies. Silently
          # downgrading the floor by hiding a high-trust file behind a crafted name is
          # the exact attack this prevents. The diff-content scan (--diff-file) is an
          # independent second classifier, so high-trust content fails regardless.
          readarray -t changed < <(git diff --name-only "origin/$BASE_REF...HEAD")
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "no changed files, nothing to classify."
            exit 0
          fi
          printf 'changed files:\n'; printf '%s\n' "${changed[@]}"
          git diff "origin/$BASE_REF...HEAD" > pr.diff
          ack=""
          if printf '%s' "$PR_BODY" | grep -qiE '^[[:space:]]*Governor-Ack:[[:space:]]*high-trust'; then
            ack="high-trust"
          fi
          python scripts/governor_floor.py \
            --paths "${changed[@]}" \
            --diff-file pr.diff \
            --gate --ack "$ack"
