# Mergen PR Guardian, a reusable drop-in for a project that uses mergen.
#
# It regenerates the verification report from the live pull-request tree (so a
# hand-edited committed report is never read), gates on it (a phantom completion
# or an unsigned high-trust report fails the build), and posts the evidence
# summary as a pull-request comment. Copy this into a consuming project's
# .github/workflows/ and adjust the --tasks-state and --root paths to that
# project. It uses the gh CLI (pre-installed on GitHub runners) to comment, so it
# needs no third-party action beyond the two SHA-pinned setup actions.
#
# Honest scope: like every in-session reinforcement, the real enforcement is this
# CI step failing the required check. The comment is a courtesy, the exit code is
# the gate.

name: PR Guardian

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  guardian:
    name: "verification evidence gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pytest (the tests-pass lens runs the project's tests)
        run: pip install pytest

      - name: Regenerate the verification report from the live tree
        run: |
          python scripts/verify_core.py \
            --tasks-state .specify/tasks-state.json \
            --root . \
            --out report.json || true

      - name: Summarize and gate the report
        id: guard
        run: |
          set +e
          python scripts/pr_guardian.py report.json --out comment.md
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post the evidence summary as a pull-request comment
        if: always() && hashFiles('comment.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass the number through the environment rather than interpolating it
          # into the run line, the GitHub injection-hardening pattern.
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file comment.md || true

      - name: Fail the build when the gate found a problem
        run: test "${{ steps.guard.outputs.rc }}" = "0"
