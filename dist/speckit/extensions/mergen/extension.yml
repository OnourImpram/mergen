schema_version: "1.0"

extension:
  id: "mergen"
  name: "Mergen (mergen verification and minimalism)"
  version: "1.0.0"
  description: "Adds adversarial verification, canonical project-state rollup, a complexity router, an over-engineering review, a deferred-shortcut debt ledger, and a risk-tier Governor to Spec Kit. Wires the verify gate as a mandatory after_implement hook (optional: false)."
  author: "OnourImpram"
  repository: "https://github.com/OnourImpram/mergen"
  license: "Apache-2.0"

requires:
  speckit_version: ">=0.6.0"

provides:
  commands:
    - name: "speckit.mergen.verify"
      file: "commands/speckit.mergen.verify.md"
      description: "Independently verify completed tasks against the filesystem and tests (the phantom-completion gate)."
    - name: "speckit.mergen.rollup"
      file: "commands/speckit.mergen.rollup.md"
      description: "Reconcile all feature specs into a single canonical project-state.md."
    - name: "speckit.mergen.go"
      file: "commands/speckit.mergen.go.md"
      description: "Route a request to the right SDD tier by complexity."
    - name: "speckit.mergen.lean"
      file: "commands/speckit.mergen.lean.md"
      description: "Review the diff or repo for over-engineering and return a delete-list. Complexity only, never correctness."
    - name: "speckit.mergen.debt"
      file: "commands/speckit.mergen.debt.md"
      description: "Harvest mergen: deferred-shortcut comments into a debt ledger so simplifications stay visible across the lifecycle."
    - name: "speckit.mergen.govern"
      file: "commands/speckit.mergen.govern.md"
      description: "Classify a task by risk and complexity, then set the memory scope, workflow depth, evidence standard, and human-approval requirement (Mergen's wisdom organ)."
    - name: "speckit.mergen.agent"
      file: "commands/speckit.mergen.agent.md"
      description: "The Mergen Agent: arm, govern, and route a task through the full SDD lifecycle in one command. The single entry point that orchestrates the 14 /mergen-* skills without replacing them."

hooks:
  after_implement:
    command: "speckit.mergen.verify"
    optional: false
    description: "Independently verify every [X] task against the filesystem and tests before completion is claimed."

tags:
  - "mergen"
  - "verification"
  - "adversarial"
