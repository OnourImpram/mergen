name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check single-source sync (dist not stale)
        run: python scripts/check_sync.py

      - name: Check no reference-prompt text is committed
        run: python scripts/check_no_reference_text.py

      - name: Phantom-detection benchmark gate (verify harness regression)
        run: python eval/benchmark.py --gate

  test-windows:
    # The repo ships a PowerShell installer and reads BOM-prefixed JSON (the form
    # PowerShell writes). Run the suite on the platform that produces those BOMs so
    # the BOM-tolerance and Windows path behavior are a CI guarantee, not a hope.
    # Scoped to the test suite: check_sync is a byte-for-byte compare and is left to
    # the Linux job to avoid autocrlf line-ending false positives on a Windows checkout.
    # The benchmark gate is OS-agnostic (fixed fixtures) and stays on the Linux job.
    name: "Windows (Python 3.12)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    name: "ruff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .

  typecheck:
    name: "mypy --strict"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install mypy
      - name: Type check (strict, library modules from pyproject [tool.mypy])
        run: mypy

  shell-smoke:
    name: "shell parse (bash + pwsh)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          shopt -s nullglob
          fail=0
          for f in core/scripts/bash/*.sh install.sh effort-mode/install.sh; do
            [ -f "$f" ] || continue
            if ! bash -n "$f"; then echo "syntax error in $f"; fail=1; fi
          done
          exit $fail
      - name: PowerShell parse check
        shell: pwsh
        run: |
          $fail = 0
          $files = @(Get-ChildItem -Path core/scripts/powershell -Filter *.ps1 -ErrorAction SilentlyContinue)
          $files += @(Get-Item install.ps1, effort-mode/install.ps1 -ErrorAction SilentlyContinue)
          foreach ($f in $files) {
            $tokens = $null; $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs.Count -gt 0) { Write-Output "parse errors in $($f.FullName)"; $errs | ForEach-Object { Write-Output $_.Message }; $fail = 1 }
          }
          exit $fail

  govern-diff:
    name: "Governor floor (PR diff)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Re-verify the REAL pull-request diff against the deterministic Governor
      # floor. A high-trust change (auth, payment, secrets, privacy, clinical,
      # migration, deploy, permission, release-artifact, or a matching diff
      # keyword) fails the build unless a human records 'Governor-Ack: high-trust'
      # in the PR body. The floor is non-downgradable: this gate refuses a silent
      # merge of a high-trust change. See eval/ci/govern-gate.yml for the
      # reusable drop-in version.
      - name: Classify the real PR diff against the Governor floor
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          changed=$(git diff --name-only "origin/$BASE_REF...HEAD")
          if [ -z "$changed" ]; then
            echo "no changed files, nothing to classify."
            exit 0
          fi
          echo "changed files:"; echo "$changed"
          git diff "origin/$BASE_REF...HEAD" > pr.diff
          ack=""
          if printf '%s' "$PR_BODY" | grep -qiE '^[[:space:]]*Governor-Ack:[[:space:]]*high-trust'; then
            ack="high-trust"
          fi
          python scripts/governor_floor.py \
            --paths $changed \
            --diff-file pr.diff \
            --gate --ack "$ack"
