name: CodeQL

# Static analysis of the Python surface. Honest scope: CodeQL on a PRIVATE
# repository requires GitHub Advanced Security. This workflow is committed so the
# scan is one repository-admin toggle away, the same honesty as the attestation
# and branch-protection steps. On a private repo without GHAS it does not run. On
# a public repo, or a private repo with GHAS enabled, it runs as written.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: "CodeQL (python)"
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fbed2d2d53d0343436c1d6332dae0b38394d3917 # v3.30.7
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@fbed2d2d53d0343436c1d6332dae0b38394d3917 # v3.30.7
        with:
          category: "/language:python"
