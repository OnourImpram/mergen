name: CodeQL

# Static analysis of the Python surface. Honest scope: CodeQL on a PRIVATE
# repository requires GitHub Advanced Security. This workflow is committed so the
# scan is one repository-admin toggle away, the same honesty as the attestation
# and branch-protection steps. On a private repo without GHAS it does not run. On
# a public repo, or a private repo with GHAS enabled, it runs as written.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: "CodeQL (python)"
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@a8d1ac45b9a34d11fe398d5503176af0d06b303e # v3.30.7
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:python"
